name: Deploy Partner Web

on:
  push:
    branches:
      - main
    paths:
      - 'apps/partner-web/**'
      - '.github/workflows/deploy-partner-web.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: deploy-partner-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npm run deploy --workspace apps/partner-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
