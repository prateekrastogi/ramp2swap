name: Deploy Partner Web

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'apps/partner-web/**'
      - 'packages/design-system/**'
      - '.github/workflows/deploy-partner-web.yml'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-partner-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || (github.ref_name == 'staging' && 'staging' || 'production') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rollup Linux native binary (npm optional-deps workaround)
        shell: bash
        run: |
          ROLLUP_LINUX_VERSION="$(node -p "require('./package-lock.json').packages['node_modules/rollup'].optionalDependencies['@rollup/rollup-linux-x64-gnu']")"
          npm install --no-save --no-audit --no-fund "@rollup/rollup-linux-x64-gnu@${ROLLUP_LINUX_VERSION}"

      - name: Enforce partner-web design system guardrails
        run: npm run check:design-system --workspace apps/partner-web

      - name: Sync Cloudflare session secret
        shell: bash
        working-directory: apps/partner-web
        run: |
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            printf '%s' "${PARTNER_AUTH_SESSION_SECRET_STAGING}" | npx wrangler secret put SESSION_SECRET --env staging
          else
            printf '%s' "${PARTNER_AUTH_SESSION_SECRET_PRODUCTION}" | npx wrangler secret put SESSION_SECRET
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PARTNER_AUTH_SESSION_SECRET_STAGING: ${{ secrets.PARTNER_AUTH_SESSION_SECRET_STAGING }}
          PARTNER_AUTH_SESSION_SECRET_PRODUCTION: ${{ secrets.PARTNER_AUTH_SESSION_SECRET_PRODUCTION }}

      - name: Deploy to Cloudflare Workers
        shell: bash
        working-directory: apps/partner-web
        run: |
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            npm run deploy -- --env staging
          else
            npm run deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
