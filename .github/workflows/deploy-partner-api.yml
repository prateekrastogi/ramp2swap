name: Deploy Partner API

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'apps/partner-api/**'
      - '.github/workflows/deploy-partner-api.yml'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-partner-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || (github.ref_name == 'staging' && 'staging' || 'production') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Cloudflare secrets
        shell: bash
        working-directory: apps/partner-api
        run: |
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            printf '%s' "${PARTNER_AUTH_SESSION_SECRET_STAGING}" | npx wrangler secret put SESSION_SECRET --env staging
            printf '%s' "${RESEND_KEY}" | npx wrangler secret put RESEND_KEY --env staging
          else
            printf '%s' "${PARTNER_AUTH_SESSION_SECRET_PRODUCTION}" | npx wrangler secret put SESSION_SECRET
            printf '%s' "${RESEND_KEY}" | npx wrangler secret put RESEND_KEY
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PARTNER_AUTH_SESSION_SECRET_STAGING: ${{ secrets.PARTNER_AUTH_SESSION_SECRET_STAGING }}
          PARTNER_AUTH_SESSION_SECRET_PRODUCTION: ${{ secrets.PARTNER_AUTH_SESSION_SECRET_PRODUCTION }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}

      - name: Run D1 auth migration
        shell: bash
        run: |
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            npx wrangler d1 execute partner-auth-staging --file ./migrations/0001_auth.sql --env staging
          else
            npx wrangler d1 execute partner-auth-prod --file ./migrations/0001_auth.sql
          fi
        working-directory: apps/partner-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        shell: bash
        working-directory: apps/partner-api
        run: |
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            npm run deploy -- --env staging
          else
            npm run deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
